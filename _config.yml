# ═══════════════════════════════════════════════════════════════
#  THEKURAL — _config.yml
#  ──────────────────────────────────────────────────────────────
#  Everything an admin needs to change is in THIS file.
#  Sections are clearly labelled. No need to touch any HTML.
# ═══════════════════════════════════════════════════════════════


# ─── SITE IDENTITY ─────────────────────────────────────────────
# Shown in browser tab, header logo, footer, meta tags.

title:        "TheKural"
tagline:      "Stories worth telling"
description:  "A thoughtful space for ideas, stories, and perspectives."
url:          "https://someoneonearthwholovestg.github.io"
baseurl:      "/the_kural"
lang:         "en"


# ─── LOGO & FAVICON ────────────────────────────────────────────
# logo_text_prefix  – the plain part of the logo  (e.g. "The")
# logo_text_accent  – the coloured part            (e.g. "Kural")
# favicon           – path or absolute URL to a .png/.ico

logo_text_prefix: "The"
logo_text_accent:  "Kural"
logo:              "https://i.ibb.co/XfkZXyCv/logo.png"
favicon:           "https://i.ibb.co/xK8XVXTn/logoo.png"

icon_light: "https://i.ibb.co/xK8XVXTn/logoo.png"   # header icon for light mode
icon_dark:  "https://i.ibb.co/xK8XVXTn/logoo.png"   # header icon for dark  mode


# ─── HEADER IMAGE ──────────────────────────────────────────────

header_image_height: "35vh"

# Leave blank ("") to hide it.
header_image_light: "https://i.ibb.co/JR1MXHb3/IMG-20260717-204257-125.jpg"
header_image_dark:  "https://i.ibb.co/ccfQGf1V/IMG-20260717-204823-131.jpg"


# ─── HEADER COLORS ─────────────────────────────────────────────
# header_bg_*        – sticky nav-bar background (supports any CSS color / gradient)
# header_text_*      – nav link & logo text color in that bar
# header_border_*    – bottom border of the sticky bar
header_colors:
  light:
    bg:     "#223143"   # nav bar background
    text:   "#efefef"   # logo + nav text
    muted:  "#6b7c93"   # secondary nav items
    # border: "#dde3eb"   # bottom border line
  dark:
    bg:     "rgba(17,29,43,0.92)"
    text:   "#e8eef4"
    muted:  "#8fa5bc"
    # border: "#2d4159"

# ─── HEADER IMAGE BACKGROUND BANDS ────────────────────────────
# Each band needs: color, from (%), to (%)
# All bands must start at 0 and end at 100 combined.
header_bg_bands:
  light:
    - color: "#ffffff"
      to: 100
#    - color: "#efefef"
#      to: 100
  dark:
    - color: "#ffffff"
      to: 100
#    - color: "#efefef"
#      to: 100

# ─── BODY COLORS (LIGHT MODE) ──────────────────────────────────
# bg            = overall page background
# surface       = cards, panels, raised elements
# text          = primary body text
# text_muted    = secondary / meta text
 
body_colors:
  light:
    bg:         "#efefef"
    surface:    "#f4f6f8"
    text:       "#223143"
    text_muted: "#6b7c93"
    # border:     "#dde3eb"
  dark:
    bg:         "#111d2b"
    surface:    "#1a2b3d"
    text:       "#e8eef4"
    text_muted: "#8fa5bc"
    # border:     "#2d4159"

# ─── FOOTER IMAGE ──────────────────────────────────────────────
# footer_image_light: "https://i.ibb.co/G4yxKJ9v/Gemini-Generated-Image-ld6y4ald6y4ald6y.png"
# footer_image_dark:  "https://i.ibb.co/G4yxKJ9v/Gemini-Generated-Image-ld6y4ald6y4ald6y.png"


# ─── FOOTER COLORS ─────────────────────────────────────────────
# Use the logo: path above in the footer (img tag) instead of text
# if logo is set. Set use_logo_in_footer: true to enable.
# footer_logo_height controls how tall the logo image renders.
 
use_logo_in_footer:  true
footer_logo_height:  60px"
 
footer_colors:
  light:
    bg:          "#223143"
    text:        "#ffffff"
    text_muted:  "#9aafc5"
    link:        "#c2d4e8"
    link_hover:  "#ffffff"
    border:      "#2d4159"
    social_bg:   "rgba(255,255,255,0.05)"
    social_hover: "rgba(255,255,255,0.15)"
    copy:        "#556a82"
  dark:
    bg:          "#0d1620"
    text:        "#e8eef4"
    text_muted:  "#8fa5bc"
    link:        "#7ba3c8"
    link_hover:  "#e8eef4"
    border:      "#1e3044"
    social_bg:   "rgba(255,255,255,0.04)"
    social_hover: "rgba(255,255,255,0.12)"
    copy:        "#4a6070"


# ─── AUTHOR ────────────────────────────────────────────────────
author:
  name:   "The Kural"
  bio:    "Voices & Perceptions"
  avatar: "https://i.ibb.co/XfkZXyCv/logo.png"


# ─── NAVIGATION ────────────────────────────────────────────────
# Controls header + footer nav. Add/remove items freely.
# For a dropdown, add a `children:` list under the parent.
# `url` values are relative to baseurl.

nav:
  explore_url: "/explore"         # "Explore all articles" button on homepage

# Nav items are stored in _data/nav.yml (unchanged)
# but the explore button URL above is set here for easy access.


# ─── SOCIAL LINKS ──────────────────────────────────────────────
# Set to "" to hide that icon in the footer.

social:
  facebook:  "https://facebook.com"
  twitter:   "https://twitter.com"
  whatsapp:  "https://wa.me/YOUR_NUMBER"   # replace YOUR_NUMBER e.g. 919876543210
  email:     "your@email.com"


# ─── SECTION LABELS (homepage) ─────────────────────────────────
# The small uppercase labels above each section on the homepage.

sections:
  nazar_label:  "Nazar — Visual Journal"
  latest_label: "Latest articles"


# ─── COLORS (LIGHT MODE) ───────────────────────────────────────
# These are CSS custom properties. Use any valid CSS color value.
# primary       = accent / links / highlights
# primary_dark  = hover state of primary
# bg            = page background
# surface       = cards, panels
# text          = main body text
# text_muted    = secondary / meta text
# border        = dividers, card borders
# accent        = subtle tint (used in gradients)
# footer        = footer background
colors:
  primary:      "#223143"
  primary_dark: "#1a2535"
  bg:           "#ffffff"
  surface:      "#f4f6f8"
  text:         "#1a2535"
  text_muted:   "#6b7c93"
  border:       "#dde3eb"
  accent:       "#a8b8cc"
  footer:       "#223143"


# ─── DARK MODE COLORS ──────────────────────────────────────────
# Applied automatically when the user toggles dark mode.
dark_colors:
  primary:      "#7ba3c8"
  primary_dark: "#9bbad5"
  bg:           "#111d2b"
  surface:      "#1a2b3d"
  text:         "#e8eef4"
  text_muted:   "#8fa5bc"
  border:       "#2d4159"
  accent:       "#3d5a78"
  footer:       "#0d1620"


# ─── TYPOGRAPHY ────────────────────────────────────────────────
# Font names must match exactly what Google Fonts serves.
# Change the name here and the stylesheet updates automatically.
# use : https://fonts.google.com/
fonts:
  post_heading:    "Playwrite Argentina Guides" #"Caveat"
  post_subheading: "Playfair Display" #"Kalam"
  body:            "PT Serif" #"Patrick Hand"
  ui:              "Source Serif 4" #"Architects Daughter"
  mono:            "IBM Plex Mono" #"JetBrains Mono"

font_sizes:
  post_heading: "3.4rem"
  card_heading: "1.45rem"
  subheading:   "1.3rem"
  body:         "1.1rem"
  ui:           "0.88rem"


# ─── FEATURES ──────────────────────────────────────────────────
show_reading_time: true
show_tags:         true
posts_per_page:    9
default_image:     "/assets/images/default-cover.png"


# ─── NAVIGATION ────────────────────────────────────────────────
nav:
  - label: Home
    url: /
  - label: Reading Room
    url: "#"
    children:
      - label: Nazar
        url: /nazar
      - label: Book Review
        url: /book-review
      - label: Keywords
        url: /keywords
      - label: Criticulture
        url: /criticulture
  - label: Submit
    url: /submission
  - label: About
    url: /about


collections_dir: src/reading-room
collections:
  nazar:
    output: true
    permalink: /nazar/:title/
  book-review:
    output: true
    permalink: /book-review/:title/
  keywords:
    output: true
    permalink: /keywords/:title/
  criticulture:
    output: true
    permalink: /criticulture/:title/


# ─── JEKYLL CORE ───────────────────────────────────────────────
markdown:    kramdown
highlighter: rouge
permalink:   /:categories/:title/

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
